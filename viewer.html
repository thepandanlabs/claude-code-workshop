<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getting Real with Claude Code — Pandan Labs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
  body {
    background-color: #262624;
    color: hsl(0 0% 98%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
  }
  .heart { display: inline-block; color: #D17D59; transform: translateY(-1px); margin: 0 0.125rem; }
  .prose-doc {
    line-height: 1.7;
    color: hsl(0 0% 88%);
  }
  .prose-doc h1 {
    font-size: 2rem;
    font-weight: 600;
    color: hsl(0 0% 98%);
    margin-top: 0;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid hsl(240 3.7% 15.9%);
  }
  .prose-doc h2 {
    font-size: 1.5rem;
    font-weight: 600;
    color: hsl(0 0% 98%);
    margin-top: 2.5rem;
    margin-bottom: 1rem;
  }
  .prose-doc h3 {
    font-size: 1.15rem;
    font-weight: 600;
    color: hsl(0 0% 98%);
    margin-top: 2rem;
    margin-bottom: 0.75rem;
  }
  .prose-doc h4 {
    font-size: 1rem;
    font-weight: 600;
    color: hsl(0 0% 98%);
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
  }
  .prose-doc p {
    margin: 1rem 0;
  }
  .prose-doc a {
    color: #D17D59;
    text-decoration: none;
    border-bottom: 1px solid rgba(209, 125, 89, 0.4);
    transition: border-color 0.15s ease;
  }
  .prose-doc a:hover { border-bottom-color: #D17D59; }
  .prose-doc strong { color: hsl(0 0% 98%); font-weight: 600; }
  .prose-doc em { color: hsl(0 0% 95%); }
  .prose-doc code {
    background-color: rgba(209, 125, 89, 0.12);
    color: #E8A687;
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
    font-size: 0.875em;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }
  .prose-doc pre {
    background-color: #1e1e1c !important;
    border: 1px solid hsl(240 3.7% 15.9%);
    border-radius: 0.5rem;
    padding: 1rem 1.25rem;
    overflow-x: auto;
    margin: 1.25rem 0;
    font-size: 0.875rem;
    line-height: 1.6;
  }
  .prose-doc pre code {
    background-color: transparent;
    color: inherit;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }
  .prose-doc ul, .prose-doc ol {
    margin: 1rem 0;
    padding-left: 1.5rem;
  }
  .prose-doc li {
    margin: 0.375rem 0;
  }
  .prose-doc ul li::marker {
    color: #D17D59;
  }
  .prose-doc ol li::marker {
    color: #D17D59;
    font-weight: 600;
  }
  .prose-doc blockquote {
    border-left: 3px solid #D17D59;
    padding: 0.25rem 0 0.25rem 1rem;
    margin: 1.25rem 0;
    color: hsl(0 0% 75%);
    font-style: italic;
  }
  .prose-doc table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.25rem 0;
    font-size: 0.9375rem;
  }
  .prose-doc th, .prose-doc td {
    border: 1px solid hsl(240 3.7% 15.9%);
    padding: 0.625rem 0.875rem;
    text-align: left;
  }
  .prose-doc th {
    background-color: #2e2e2c;
    color: hsl(0 0% 98%);
    font-weight: 600;
  }
  .prose-doc tr:nth-child(even) td {
    background-color: rgba(46, 46, 44, 0.4);
  }
  .prose-doc hr {
    border: none;
    border-top: 1px solid hsl(240 3.7% 15.9%);
    margin: 2rem 0;
  }
  .prose-doc input[type="checkbox"] {
    margin-right: 0.5rem;
    accent-color: #D17D59;
  }
  .top-bar {
    border-bottom: 1px solid hsl(240 3.7% 15.9%);
    background-color: #262624;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-link {
    color: #D17D59;
    text-decoration: none;
    font-size: 0.875rem;
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    transition: color 0.15s ease;
  }
  .back-link:hover { color: #E8A687; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="back-link">
      <span>←</span>
      <span>Getting Real with Claude Code</span>
    </a>
    <div class="text-xs text-fg-muted" style="color: hsl(0 0% 64%);">Pandan Labs</div>
  </div>
</div>

<main class="max-w-4xl mx-auto px-6 py-12">
  <article id="content" class="prose-doc">
    <p class="text-fg-muted" style="color: hsl(0 0% 64%);">Loading…</p>
  </article>

  <footer class="mt-16 pt-8 border-t text-center text-sm" style="border-color: hsl(240 3.7% 15.9%); color: hsl(0 0% 64%);">
    From Pandan Labs with <span class="heart" aria-label="love" title="love">♥</span>
  </footer>
</main>

<script>
  // Parse ?file= query param
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const content = document.getElementById('content');

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Whitelist: only allow files under known content dirs, .md extension, no traversal.
  function isSafePath(p) {
    if (!p) return false;
    if (p.indexOf('..') !== -1) return false;
    if (p.charAt(0) === '/') return false;
    if (!/\.md$/i.test(p)) return false;
    return /^(days|resources|tracks|appendix|cheat-sheets|exercises)\//.test(p);
  }

  if (!isSafePath(file)) {
    content.innerHTML = `
      <h1>File not specified</h1>
      <p>This viewer renders markdown content from the workshop. Head back to the <a href="index.html">workshop home</a> and pick a card.</p>
    `;
  } else {
    fetch(file)
      .then(r => {
        if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
        return r.text();
      })
      .then(md => {
        marked.setOptions({
          gfm: true,
          breaks: false,
          highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
              try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
            }
            return hljs.highlightAuto(code).value;
          }
        });
        content.innerHTML = marked.parse(md);
        document.querySelectorAll('pre code').forEach(b => {
          try { hljs.highlightElement(b); } catch (e) {}
        });
        // Update tab title to the first H1 if present
        const h1 = content.querySelector('h1');
        if (h1) document.title = h1.textContent + ' — Pandan Labs';
      })
      .catch(err => {
        content.innerHTML = `
          <h1>Couldn't load that file</h1>
          <p>Tried to load <code>${escapeHtml(file)}</code> but got: <code>${escapeHtml(String(err))}</code>.</p>
          <p>Go back to the <a href="index.html">workshop home</a>.</p>
        `;
      });
  }
</script>

</body>
</html>
